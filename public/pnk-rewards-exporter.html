<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PNK Rewards Exporter</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  </head>
  <body style="margin: 0">
    <div id="root"></div>
    <script type="text/babel">
      const { useState, useRef, useCallback, useEffect } = React;

      const IPFS = "https://cdn.kleros.link/ipfs/";
      const CLAIM_MODAL_URL = "https://raw.githubusercontent.com/kleros/court/master/src/components/claim-modal.js";

      function parseSnapshotsFromSource(source) {
        // Find chainIdToParams object, extract snapshots for chain 1 (mainnet) and 100 (gnosis)
        // Strategy: find each "snapshots: [" block after the chain key and collect all quoted strings

        const mainnetMatch = source.match(/\b1:\s*\{[^}]*?snapshots:\s*\[([\s\S]*?)\]/);
        const gnosisMatch = source.match(/\b100:\s*\{[^}]*?snapshots:\s*\[([\s\S]*?)\]/);

        function extractPaths(block) {
          if (!block) return [];
          const paths = [];
          const re = /"([^"]+\.json)"/g;
          let m;
          while ((m = re.exec(block)) !== null) {
            paths.push(m[1]);
          }
          return paths;
        }

        const mainnetPaths = extractPaths(mainnetMatch?.[1]);
        const gnosisPaths = extractPaths(gnosisMatch?.[1]);

        function toSnapshot(path) {
          const filename = path.split("/").pop();
          const dateMatch = filename.match(/(\d{4}-\d{2})/);
          const label = dateMatch ? dateMatch[1] : "Pre 2021-03";
          return { path, label };
        }

        return {
          mainnet: mainnetPaths.map(toSnapshot),
          gnosis: gnosisPaths.map(toSnapshot),
        };
      }

      function hexToDecimal(hex) {
        if (!hex) return 0;
        const clean = hex.startsWith("0x") ? hex.slice(2) : hex;
        if (clean.length === 0) return 0;
        try {
          const val = BigInt("0x" + clean);
          const whole = val / BigInt("1000000000000000000");
          const frac = val % BigInt("1000000000000000000");
          const fracStr = frac.toString().padStart(18, "0").replace(/0+$/, "");
          if (fracStr.length === 0) return Number(whole);
          return parseFloat(whole.toString() + "." + fracStr);
        } catch {
          return 0;
        }
      }

      function extractClaims(data) {
        const claims = {};
        if (!data?.merkleTree?.claims) return claims;
        for (const [addr, info] of Object.entries(data.merkleTree.claims)) {
          const hex = info?.value?.hex;
          if (hex) claims[addr] = hexToDecimal(hex);
        }
        return claims;
      }

      async function fetchSnapshot(path, retries = 3) {
        for (let i = 0; i < retries; i++) {
          try {
            const r = await fetch(IPFS + path);
            if (!r.ok) throw new Error("HTTP " + r.status);
            return await r.json();
          } catch (e) {
            if (i === retries - 1) throw e;
            await new Promise((res) => setTimeout(res, 1000 * (i + 1)));
          }
        }
      }

      function App() {
        const [status, setStatus] = useState("loading-source");
        const [snapshots, setSnapshots] = useState(null);
        const [sourceError, setSourceError] = useState(null);
        const [progress, setProgress] = useState({ done: 0, total: 0, current: "" });
        const [errors, setErrors] = useState([]);
        const [stats, setStats] = useState(null);
        const cancelRef = useRef(false);

        useEffect(() => {
          fetch(CLAIM_MODAL_URL)
            .then((r) => {
              if (!r.ok) throw new Error("HTTP " + r.status);
              return r.text();
            })
            .then((source) => {
              const parsed = parseSnapshotsFromSource(source);
              if (parsed.mainnet.length === 0 && parsed.gnosis.length === 0) {
                throw new Error("Could not parse any snapshots from claim-modal.js");
              }
              setSnapshots(parsed);
              setStatus("idle");
            })
            .catch((e) => {
              setSourceError(e.message);
              setStatus("source-error");
            });
        }, []);

        const run = useCallback(async () => {
          if (!snapshots) return;
          cancelRef.current = false;
          setStatus("fetching");
          setErrors([]);
          setStats(null);

          const allSnapshots = [
            ...snapshots.mainnet.map((s) => ({ ...s, chain: "Mainnet" })),
            ...snapshots.gnosis.map((s) => ({ ...s, chain: "Gnosis" })),
          ];
          const total = allSnapshots.length;
          setProgress({ done: 0, total, current: "" });

          const monthData = {};
          const grandTotals = {};
          const errs = [];
          const CONCURRENCY = 5;

          for (let i = 0; i < total; i += CONCURRENCY) {
            if (cancelRef.current) {
              setStatus("idle");
              return;
            }
            const batch = allSnapshots.slice(i, i + CONCURRENCY);
            const results = await Promise.allSettled(
              batch.map(async (snap) => {
                setProgress((p) => ({ ...p, current: snap.chain + " " + snap.label }));
                const data = await fetchSnapshot(snap.path);
                return { snap, data };
              })
            );

            for (const r of results) {
              if (r.status === "fulfilled") {
                const { snap, data } = r.value;
                const claims = extractClaims(data);
                if (!monthData[snap.label]) monthData[snap.label] = { mainnet: {}, gnosis: {} };
                const chainKey = snap.chain === "Mainnet" ? "mainnet" : "gnosis";
                for (const [addr, amt] of Object.entries(claims)) {
                  if (amt > 0) monthData[snap.label][chainKey][addr] = amt;
                }
                for (const [addr, amt] of Object.entries(claims)) {
                  if (amt <= 0) continue;
                  if (!grandTotals[addr]) grandTotals[addr] = { mainnet: 0, gnosis: 0 };
                  grandTotals[addr][chainKey] += amt;
                }
              } else {
                const snap = batch[results.indexOf(r)];
                errs.push(snap.chain + " " + snap.label + ": " + (r.reason?.message || "unknown error"));
              }
            }
            setProgress({ done: Math.min(i + CONCURRENCY, total), total, current: "" });
          }

          setErrors(errs);
          setStatus("building");
          setProgress((p) => ({ ...p, current: "Building Excel..." }));
          await new Promise((res) => setTimeout(res, 50));

          try {
            const wb = XLSX.utils.book_new();

            const summaryRows = Object.entries(grandTotals)
              .map(([addr, t]) => ({
                Address: addr,
                "Total Mainnet PNK": Math.round(t.mainnet * 100) / 100,
                "Total Gnosis PNK": Math.round(t.gnosis * 100) / 100,
                "Grand Total PNK": Math.round((t.mainnet + t.gnosis) * 100) / 100,
              }))
              .sort((a, b) => b["Grand Total PNK"] - a["Grand Total PNK"]);

            const summaryWs = XLSX.utils.json_to_sheet(summaryRows);
            summaryWs["!cols"] = [{ wch: 44 }, { wch: 20 }, { wch: 20 }, { wch: 20 }];
            XLSX.utils.book_append_sheet(wb, summaryWs, "Summary");

            const sortedMonths = Object.keys(monthData).sort((a, b) => {
              if (a === "Pre 2021-03") return -1;
              if (b === "Pre 2021-03") return 1;
              return a.localeCompare(b);
            });

            for (const label of sortedMonths) {
              const { mainnet, gnosis } = monthData[label];
              const allAddrs = new Set([...Object.keys(mainnet), ...Object.keys(gnosis)]);
              if (allAddrs.size === 0) continue;
              const rows = [...allAddrs]
                .map((addr) => {
                  const m = mainnet[addr] || 0;
                  const g = gnosis[addr] || 0;
                  return {
                    Address: addr,
                    "Mainnet PNK": Math.round(m * 100) / 100,
                    "Gnosis PNK": Math.round(g * 100) / 100,
                    "Total PNK": Math.round((m + g) * 100) / 100,
                  };
                })
                .sort((a, b) => b["Total PNK"] - a["Total PNK"]);
              const ws = XLSX.utils.json_to_sheet(rows);
              ws["!cols"] = [{ wch: 44 }, { wch: 18 }, { wch: 18 }, { wch: 18 }];
              let name = label.length > 31 ? label.slice(0, 31) : label;
              XLSX.utils.book_append_sheet(wb, ws, name);
            }

            const buf = XLSX.write(wb, { bookType: "xlsx", type: "array" });
            const blob = new Blob([buf], {
              type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet",
            });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "kleros_pnk_rewards_all_months.xlsx";
            a.click();
            URL.revokeObjectURL(url);

            setStats({
              addresses: summaryRows.length,
              sheets: sortedMonths.length,
              topAddr: summaryRows[0]?.Address || "N/A",
              topAmt: summaryRows[0]?.["Grand Total PNK"] || 0,
            });
            setStatus("done");
          } catch (e) {
            setErrors((prev) => [...prev, "Excel build error: " + e.message]);
            setStatus("error");
          }
        }, [snapshots]);

        const pct = progress.total > 0 ? Math.round((progress.done / progress.total) * 100) : 0;
        const totalSnaps = snapshots ? snapshots.mainnet.length + snapshots.gnosis.length : 0;

        return (
          <div
            style={{
              minHeight: "100vh",
              background: "linear-gradient(145deg, #0a0a12 0%, #12121f 50%, #0d0d18 100%)",
              color: "#e0e0ec",
              fontFamily: "'JetBrains Mono', 'Fira Code', 'SF Mono', monospace",
              padding: "40px 24px",
              display: "flex",
              flexDirection: "column",
              alignItems: "center",
            }}
          >
            <div style={{ maxWidth: 720, width: "100%" }}>
              <div
                style={{
                  fontSize: 11,
                  letterSpacing: 6,
                  textTransform: "uppercase",
                  color: "#6c5ce7",
                  marginBottom: 8,
                }}
              >
                Kleros Court
              </div>
              <h1
                style={{
                  fontSize: 28,
                  fontWeight: 700,
                  margin: "0 0 6px 0",
                  background: "linear-gradient(90deg, #a29bfe, #6c5ce7, #fd79a8)",
                  WebkitBackgroundClip: "text",
                  WebkitTextFillColor: "transparent",
                }}
              >
                PNK Rewards Exporter
              </h1>
              <p style={{ color: "#8888aa", fontSize: 13, margin: "0 0 12px 0" }}>
                Auto-fetches snapshot hashes from GitHub master branch &middot; Always up to date
              </p>
              <p style={{ color: "#6c6c8a", fontSize: 11, margin: "0 0 32px 0", lineHeight: 1.6 }}>
                Tip: The exported .xlsx file is best viewed by importing it into&nbsp;
                <a
                  href="https://sheets.google.com"
                  target="_blank"
                  rel="noopener noreferrer"
                  style={{ color: "#a29bfe", textDecoration: "none" }}
                >
                  Google Sheets
                </a>
                &nbsp;(File &rarr; Import &rarr; Upload) or Microsoft Excel.
              </p>

              {status === "loading-source" && (
                <div
                  style={{
                    background: "rgba(255,255,255,0.03)",
                    border: "1px solid rgba(108,92,231,0.2)",
                    borderRadius: 12,
                    padding: 28,
                    textAlign: "center",
                    color: "#a29bfe",
                    fontSize: 14,
                  }}
                >
                  Fetching snapshot list from GitHub...
                </div>
              )}

              {status === "source-error" && (
                <div
                  style={{
                    background: "rgba(253,121,168,0.08)",
                    border: "1px solid rgba(253,121,168,0.25)",
                    borderRadius: 12,
                    padding: 20,
                  }}
                >
                  <div style={{ color: "#fd79a8", fontWeight: 600, marginBottom: 8 }}>
                    Failed to load snapshot list from GitHub
                  </div>
                  <div style={{ fontSize: 12, color: "#ff7675", marginBottom: 12 }}>{sourceError}</div>
                  <button
                    onClick={() => window.location.reload()}
                    style={{
                      padding: "8px 20px",
                      fontSize: 12,
                      fontFamily: "inherit",
                      background: "transparent",
                      color: "#fd79a8",
                      border: "1px solid rgba(253,121,168,0.3)",
                      borderRadius: 6,
                      cursor: "pointer",
                    }}
                  >
                    Retry
                  </button>
                </div>
              )}

              {snapshots && (
                <div
                  style={{
                    background: "rgba(255,255,255,0.03)",
                    border: "1px solid rgba(108,92,231,0.2)",
                    borderRadius: 12,
                    padding: 28,
                    marginBottom: 24,
                  }}
                >
                  <div style={{ display: "flex", gap: 20, marginBottom: 20, fontSize: 12 }}>
                    <div>
                      <span style={{ color: "#6c5ce7" }}>&#9632;</span> Mainnet: {snapshots.mainnet.length} snapshots
                    </div>
                    <div>
                      <span style={{ color: "#fd79a8" }}>&#9632;</span> Gnosis: {snapshots.gnosis.length} snapshots
                    </div>
                  </div>
                  <div style={{ fontSize: 12, color: "#8888aa", lineHeight: 1.7 }}>
                    <div>
                      &#8227; Snapshot hashes fetched live from <code style={{ color: "#a29bfe" }}>kleros/court</code>{" "}
                      master branch
                    </div>
                    <div>
                      &#8227; Extracts <code style={{ color: "#a29bfe" }}>merkleTree.claims[address].value.hex</code>
                    </div>
                    <div>
                      &#8227; Converts hex &rarr; decimal &rarr; divides by 10<sup>18</sup> (wei &rarr; PNK)
                    </div>
                    <div>&#8227; Generates .xlsx with one tab per month (Mainnet + Gnosis merged) + Summary</div>
                  </div>
                </div>
              )}

              {status === "idle" && (
                <button
                  onClick={run}
                  style={{
                    width: "100%",
                    padding: "16px",
                    fontSize: 15,
                    fontWeight: 600,
                    fontFamily: "inherit",
                    background: "linear-gradient(135deg, #6c5ce7, #a29bfe)",
                    color: "#fff",
                    border: "none",
                    borderRadius: 10,
                    cursor: "pointer",
                    letterSpacing: 1,
                  }}
                >
                  Start Fetching &amp; Generate Excel ({totalSnaps} snapshots)
                </button>
              )}

              {(status === "fetching" || status === "building") && (
                <div>
                  <div
                    style={{
                      display: "flex",
                      justifyContent: "space-between",
                      fontSize: 12,
                      marginBottom: 8,
                      color: "#a29bfe",
                    }}
                  >
                    <span>
                      {status === "building"
                        ? "Building Excel file..."
                        : "Fetching " + progress.done + "/" + progress.total}
                    </span>
                    <span>{pct}%</span>
                  </div>
                  <div style={{ height: 6, background: "rgba(255,255,255,0.06)", borderRadius: 3, overflow: "hidden" }}>
                    <div
                      style={{
                        height: "100%",
                        width: pct + "%",
                        background: "linear-gradient(90deg, #6c5ce7, #fd79a8)",
                        borderRadius: 3,
                        transition: "width 0.3s ease",
                      }}
                    />
                  </div>
                  {progress.current && (
                    <div style={{ fontSize: 11, color: "#6c6c8a", marginTop: 6 }}>{progress.current}</div>
                  )}
                  <button
                    onClick={() => {
                      cancelRef.current = true;
                      setStatus("idle");
                    }}
                    style={{
                      marginTop: 16,
                      padding: "8px 20px",
                      fontSize: 12,
                      fontFamily: "inherit",
                      background: "transparent",
                      color: "#fd79a8",
                      border: "1px solid rgba(253,121,168,0.3)",
                      borderRadius: 6,
                      cursor: "pointer",
                    }}
                  >
                    Cancel
                  </button>
                </div>
              )}

              {status === "done" && stats && (
                <div
                  style={{
                    background: "rgba(108,92,231,0.08)",
                    border: "1px solid rgba(108,92,231,0.25)",
                    borderRadius: 12,
                    padding: 24,
                  }}
                >
                  <div style={{ fontSize: 16, fontWeight: 600, color: "#a29bfe", marginBottom: 16 }}>
                    &#10003; Excel downloaded!
                  </div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "12px 24px", fontSize: 13 }}>
                    <div>
                      <div style={{ color: "#6c6c8a", fontSize: 10, textTransform: "uppercase", letterSpacing: 2 }}>
                        Unique Addresses
                      </div>
                      <div style={{ fontWeight: 600, fontSize: 18, color: "#e0e0ec" }}>
                        {stats.addresses.toLocaleString()}
                      </div>
                    </div>
                    <div>
                      <div style={{ color: "#6c6c8a", fontSize: 10, textTransform: "uppercase", letterSpacing: 2 }}>
                        Monthly Tabs
                      </div>
                      <div style={{ fontWeight: 600, fontSize: 18, color: "#e0e0ec" }}>{stats.sheets}</div>
                    </div>
                    <div style={{ gridColumn: "1 / -1" }}>
                      <div style={{ color: "#6c6c8a", fontSize: 10, textTransform: "uppercase", letterSpacing: 2 }}>
                        Top Rewarded Address
                      </div>
                      <div style={{ fontWeight: 600, fontSize: 13, color: "#fd79a8", wordBreak: "break-all" }}>
                        {stats.topAddr}
                      </div>
                      <div style={{ color: "#a29bfe", fontSize: 13 }}>{stats.topAmt.toLocaleString()} PNK total</div>
                    </div>
                  </div>
                  <button
                    onClick={() => {
                      setStatus("idle");
                      setStats(null);
                    }}
                    style={{
                      marginTop: 20,
                      padding: "10px 24px",
                      fontSize: 13,
                      fontFamily: "inherit",
                      background: "linear-gradient(135deg, #6c5ce7, #a29bfe)",
                      color: "#fff",
                      border: "none",
                      borderRadius: 8,
                      cursor: "pointer",
                    }}
                  >
                    Run Again
                  </button>
                </div>
              )}

              {status === "error" && (
                <div
                  style={{
                    background: "rgba(253,121,168,0.08)",
                    border: "1px solid rgba(253,121,168,0.25)",
                    borderRadius: 12,
                    padding: 20,
                  }}
                >
                  <div style={{ color: "#fd79a8", fontWeight: 600, marginBottom: 8 }}>Error building Excel</div>
                  <button
                    onClick={() => setStatus("idle")}
                    style={{
                      padding: "8px 20px",
                      fontSize: 12,
                      fontFamily: "inherit",
                      background: "transparent",
                      color: "#fd79a8",
                      border: "1px solid rgba(253,121,168,0.3)",
                      borderRadius: 6,
                      cursor: "pointer",
                    }}
                  >
                    Try Again
                  </button>
                </div>
              )}

              {errors.length > 0 && (
                <div
                  style={{
                    marginTop: 20,
                    fontSize: 11,
                    color: "#ff7675",
                    background: "rgba(255,118,117,0.06)",
                    border: "1px solid rgba(255,118,117,0.15)",
                    borderRadius: 8,
                    padding: 16,
                    maxHeight: 150,
                    overflow: "auto",
                  }}
                >
                  <div style={{ fontWeight: 600, marginBottom: 6 }}>
                    {errors.length} fetch error{errors.length > 1 ? "s" : ""} (skipped):
                  </div>
                  {errors.map((e, i) => (
                    <div key={i} style={{ marginBottom: 2 }}>
                      {e}
                    </div>
                  ))}
                </div>
              )}

              <div style={{ marginTop: 32, fontSize: 10, color: "#44445a", textAlign: "center", lineHeight: 1.8 }}>
                Data sourced from Kleros MerkleRedeem snapshots on IPFS
                <br />
                Snapshot list auto-fetched from github.com/kleros/court master branch
                <br />
                Mainnet contract: 0xdbc3088Dfebc3cc6A84B0271DaDe2696DB00Af38
                <br />
                Gnosis contract: 0xf1A9589880DbF393F32A5b2d5a0054Fa10385074
              </div>
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
